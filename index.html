<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词卡片 - 英语学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7ff; min-height: 100vh; color: #333; }
        .header { background: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 8px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 10; }
        .logo { font-size: 20px; font-weight: 700; color: #5b67f5; }
        .nav-tabs { display: flex; gap: 6px; }
        .nav-tab { padding: 8px 18px; border-radius: 20px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; background: #f0f4ff; color: #666; }
        .nav-tab.active { background: #5b67f5; color: white; }
        .container { max-width: 560px; margin: 0 auto; padding: 32px 20px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 14px; color: #888; margin-bottom: 10px; }
        .progress-bar { height: 6px; background: #e4e8ff; border-radius: 3px; margin-bottom: 28px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #5b67f5, #a78bfa); border-radius: 3px; transition: width 0.4s ease; width: 0%; }
        .card-area { perspective: 1000px; margin-bottom: 28px; }
        .card { width: 100%; height: 260px; position: relative; transform-style: preserve-3d; transition: transform 0.55s ease; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px; }
        .card-front { background: white; box-shadow: 0 8px 32px rgba(91,103,245,0.12); }
        .card-back { background: linear-gradient(135deg, #5b67f5 0%, #a78bfa 100%); color: white; transform: rotateY(180deg); box-shadow: 0 8px 32px rgba(91,103,245,0.3); }
        .word-text { font-size: 52px; font-weight: 800; color: #2d3748; letter-spacing: 1px; margin-bottom: 6px; }
        .phonetic-text { font-size: 17px; color: #a0aec0; margin-bottom: 20px; font-family: Georgia, serif; }
        .tap-hint { font-size: 13px; color: #a0aec0; border: 1px solid #e8ebff; padding: 6px 14px; border-radius: 20px; }
        .meaning-text { font-size: 36px; font-weight: 700; margin-bottom: 14px; }
        .example-text { font-size: 14px; opacity: 0.88; text-align: center; line-height: 1.7; font-style: italic; }
        .btn-row { display: flex; gap: 14px; }
        .btn { flex: 1; padding: 15px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: #5b67f5; color: white; box-shadow: 0 4px 14px rgba(91,103,245,0.35); }
        .btn-success { background: #22c55e; color: white; box-shadow: 0 4px 14px rgba(34,197,94,0.3); }
        .btn-danger  { background: #f87171; color: white; box-shadow: 0 4px 14px rgba(248,113,113,0.3); }
        .btn-ghost   { background: white; color: #5b67f5; border: 2px solid #e8ebff; }
        .summary { background: white; border-radius: 20px; padding: 48px 36px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.06); }
        .summary-emoji { font-size: 72px; margin-bottom: 20px; }
        .summary-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        .summary-sub { color: #888; margin-bottom: 28px; }
        .stats-row { display: flex; justify-content: center; gap: 40px; margin-bottom: 32px; }
        .stat-num { font-size: 42px; font-weight: 800; }
        .stat-label { font-size: 13px; color: #888; margin-top: 4px; }
        .add-form { background: white; border-radius: 16px; padding: 22px; margin-bottom: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
        .add-form h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #555; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .text-input { flex: 1; padding: 10px 14px; border: 1.5px solid #e8ebff; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .text-input:focus { border-color: #5b67f5; }
        .btn-sm { padding: 10px 18px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #5b67f5; color: white; white-space: nowrap; }
        .total-badge { font-size: 13px; color: #888; margin-bottom: 14px; }
        .word-list { display: flex; flex-direction: column; gap: 8px; }
        .word-row { background: white; border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .word-row-word { font-weight: 600; font-size: 16px; }
        .word-row-ph { color: #bbb; font-size: 12px; font-family: Georgia, serif; }
        .word-row-meaning { color: #888; font-size: 13px; margin-top: 2px; }
        .btn-del { background: none; border: none; color: #ddd; cursor: pointer; font-size: 20px; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; }
        .btn-del:hover { color: #f87171; background: #fff0f0; }
        .empty { text-align: center; padding: 60px; color: #ccc; font-size: 15px; line-height: 2; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">📖 单词卡片</div>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchView('study')">学习</button>
        <button class="nav-tab" onclick="switchView('words')">单词本</button>
    </div>
</div>
<div class="container">
    <div id="studyView">
        <div id="progressSection">
            <div class="progress-info">
                <span id="progressText">第 1 个 / 共 25 个</span>
                <span id="statsText">✅ 0 &nbsp; ❌ 0</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>
        <div id="cardSection">
            <div class="card-area">
                <div class="card" id="card" onclick="flipCard()">
                    <div class="card-face card-front">
                        <div class="word-text" id="wordText">apple</div>
                        <div class="phonetic-text" id="phoneticText">/ˈæpəl/</div>
                        <div class="tap-hint">点击翻转查看释义 →</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="meaning-text" id="meaningText">苹果</div>
                        <div class="example-text" id="exampleText"></div>
                    </div>
                </div>
            </div>
            <div class="btn-row" id="btnRow">
                <button class="btn btn-primary" onclick="flipCard()">翻转卡片</button>
            </div>
        </div>
        <div class="summary hidden" id="summary">
            <div class="summary-emoji" id="summaryEmoji">🎉</div>
            <div class="summary-title">本轮完成！</div>
            <div class="summary-sub">继续加油，坚持就是胜利！</div>
            <div class="stats-row">
                <div><div class="stat-num" style="color:#22c55e" id="knownNum">0</div><div class="stat-label">已掌握</div></div>
                <div><div class="stat-num" style="color:#f87171" id="unknownNum">0</div><div class="stat-label">需复习</div></div>
            </div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="reviewWrong()">只练不会的</button>
                <button class="btn btn-primary" onclick="restartAll()">重新开始</button>
            </div>
        </div>
    </div>
    <div id="wordsView" class="hidden">
        <div class="add-form">
            <h3>+ 添加新单词</h3>
            <div class="input-row">
                <input class="text-input" id="inWord" placeholder="英文单词（如 beautiful）">
                <input class="text-input" id="inMeaning" placeholder="中文释义（如 美丽的）">
            </div>
            <div class="input-row">
                <input class="text-input" id="inExample" placeholder="例句（选填，中英文用 / 分隔）">
                <button class="btn-sm" onclick="addWord()">添加</button>
            </div>
        </div>
        <div class="total-badge" id="totalBadge">共 25 个单词</div>
        <div class="word-list" id="wordList"></div>
    </div>
</div>
<script>
const DEFAULTS = [
    { id:1,  word:"apple",     phonetic:"/ˈæpəl/",       meaning:"苹果",       example:"I eat an apple every day. / 我每天吃一个苹果。" },
    { id:2,  word:"book",      phonetic:"/bʊk/",          meaning:"书",         example:"This book is very interesting. / 这本书很有趣。" },
    { id:3,  word:"water",     phonetic:"/ˈwɔːtər/",     meaning:"水",         example:"Please give me a glass of water. / 请给我一杯水。" },
    { id:4,  word:"time",      phonetic:"/taɪm/",         meaning:"时间",       example:"Time flies. / 时光飞逝。" },
    { id:5,  word:"happy",     phonetic:"/ˈhæpi/",       meaning:"快乐的",     example:"She looks very happy today. / 她今天看起来很开心。" },
    { id:6,  word:"learn",     phonetic:"/lɜːrn/",       meaning:"学习",       example:"I want to learn English. / 我想学英语。" },
    { id:7,  word:"friend",    phonetic:"/frend/",        meaning:"朋友",       example:"He is my best friend. / 他是我最好的朋友。" },
    { id:8,  word:"work",      phonetic:"/wɜːrk/",       meaning:"工作",       example:"I go to work every morning. / 我每天早上去上班。" },
    { id:9,  word:"food",      phonetic:"/fuːd/",         meaning:"食物",       example:"Chinese food is delicious. / 中国食物很美味。" },
    { id:10, word:"school",    phonetic:"/skuːl/",        meaning:"学校",       example:"My school is near my home. / 我的学校离家很近。" },
    { id:11, word:"beautiful", phonetic:"/ˈbjuːtɪfəl/",  meaning:"美丽的",     example:"What a beautiful day! / 多么美好的一天！" },
    { id:12, word:"important", phonetic:"/ɪmˈpɔːrtənt/", meaning:"重要的",     example:"Health is very important. / 健康非常重要。" },
    { id:13, word:"know",      phonetic:"/noʊ/",          meaning:"知道，了解", example:"Do you know her name? / 你知道她的名字吗？" },
    { id:14, word:"think",     phonetic:"/θɪŋk/",         meaning:"认为，思考", example:"I think this is correct. / 我认为这是正确的。" },
    { id:15, word:"need",      phonetic:"/niːd/",         meaning:"需要",       example:"I need your help. / 我需要你的帮助。" },
    { id:16, word:"help",      phonetic:"/help/",         meaning:"帮助",       example:"Can you help me? / 你能帮助我吗？" },
    { id:17, word:"people",    phonetic:"/ˈpiːpəl/",     meaning:"人们",       example:"Many people like music. / 很多人喜欢音乐。" },
    { id:18, word:"family",    phonetic:"/ˈfæməli/",     meaning:"家庭",       example:"My family is very warm. / 我的家庭非常温暖。" },
    { id:19, word:"money",     phonetic:"/ˈmʌni/",       meaning:"钱",         example:"Money is not everything. / 钱不是一切。" },
    { id:20, word:"dream",     phonetic:"/driːm/",        meaning:"梦想",       example:"Never give up your dream. / 永远不要放弃你的梦想。" },
    { id:21, word:"travel",    phonetic:"/ˈtrævəl/",     meaning:"旅行",       example:"I love to travel. / 我喜欢旅行。" },
    { id:22, word:"music",     phonetic:"/ˈmjuːzɪk/",   meaning:"音乐",       example:"Music makes life better. / 音乐让生活更美好。" },
    { id:23, word:"listen",    phonetic:"/ˈlɪsən/",      meaning:"听",         example:"Please listen carefully. / 请仔细听。" },
    { id:24, word:"speak",     phonetic:"/spiːk/",        meaning:"说，讲",     example:"Can you speak English? / 你会说英语吗？" },
    { id:25, word:"success",   phonetic:"/səkˈses/",     meaning:"成功",       example:"Hard work leads to success. / 努力工作会带来成功。" },
];
function loadWords() { try { return JSON.parse(localStorage.getItem('flashWords')) || DEFAULTS; } catch { return DEFAULTS; } }
function saveWords() { localStorage.setItem('flashWords', JSON.stringify(words)); }
let words = loadWords();
let deck = [], idx = 0, known = [], unknown = [], flipped = false;
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function startDeck(list) {
    if(list.length===0){alert('没有单词，请先添加！');switchView('words');return;}
    deck=shuffle(list);idx=0;known=[];unknown=[];flipped=false;
    document.getElementById('summary').classList.add('hidden');
    document.getElementById('cardSection').classList.remove('hidden');
    document.getElementById('progressSection').classList.remove('hidden');
    showCurrent();
}
function showCurrent() {
    if(idx>=deck.length){showSummary();return;}
    const w=deck[idx];
    document.getElementById('wordText').textContent=w.word;
    document.getElementById('phoneticText').textContent=w.phonetic||'';
    document.getElementById('meaningText').textContent=w.meaning;
    const ex=(w.example||'').split(' / ');
    document.getElementById('exampleText').innerHTML=ex.map(s=>esc(s)).join('<br>');
    document.getElementById('card').classList.remove('flipped');
    flipped=false;setButtons('flip');updateProgress();
}
function flipCard() { flipped=!flipped; document.getElementById('card').classList.toggle('flipped',flipped); setButtons(flipped?'judge':'flip'); }
function setButtons(mode) {
    const row=document.getElementById('btnRow');
    if(mode==='flip'){row.innerHTML=`<button class="btn btn-primary" onclick="flipCard()">翻转卡片</button>`;}
    else{row.innerHTML=`<button class="btn btn-danger" onclick="judge(false)">❌ 不会</button><button class="btn btn-success" onclick="judge(true)">✅ 会了</button>`;}
}
function judge(isKnown) { (isKnown?known:unknown).push(deck[idx]); idx++; showCurrent(); }
function updateProgress() {
    const total=deck.length;
    document.getElementById('progressText').textContent=`第 ${Math.min(idx+1,total)} 个 / 共 ${total} 个`;
    document.getElementById('statsText').innerHTML=`✅ ${known.length} &nbsp; ❌ ${unknown.length}`;
    document.getElementById('progressFill').style.width=(total>0?idx/total*100:0)+'%';
}
function showSummary() {
    document.getElementById('cardSection').classList.add('hidden');
    document.getElementById('progressSection').classList.add('hidden');
    document.getElementById('knownNum').textContent=known.length;
    document.getElementById('unknownNum').textContent=unknown.length;
    const rate=deck.length>0?known.length/deck.length:0;
    document.getElementById('summaryEmoji').textContent=rate>=0.8?'🎉':rate>=0.5?'💪':'📚';
    document.getElementById('summary').classList.remove('hidden');
}
function restartAll() { startDeck(words); }
function reviewWrong() { if(unknown.length===0){alert('你全部都会了！太棒了！');return;} startDeck(unknown); }
function renderWordList() {
    document.getElementById('totalBadge').textContent=`共 ${words.length} 个单词`;
    const list=document.getElementById('wordList');
    if(words.length===0){list.innerHTML='<div class="empty">还没有单词<br>快去添加第一个吧！</div>';return;}
    list.innerHTML=words.map(w=>`<div class="word-row"><div><div class="word-row-word">${esc(w.word)} <span class="word-row-ph">${esc(w.phonetic||'')}</span></div><div class="word-row-meaning">${esc(w.meaning)}</div></div><button class="btn-del" onclick="deleteWord(${w.id})">🗑</button></div>`).join('');
}
function addWord() {
    const word=document.getElementById('inWord').value.trim();
    const meaning=document.getElementById('inMeaning').value.trim();
    const example=document.getElementById('inExample').value.trim();
    if(!word||!meaning){alert('请填写英文单词和中文释义！');return;}
    words.push({id:Date.now(),word,phonetic:'',meaning,example});
    saveWords();renderWordList();
    ['inWord','inMeaning','inExample'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('inWord').focus();
}
function deleteWord(id) { if(!confirm('确定删除？'))return; words=words.filter(w=>w.id!==id); saveWords(); renderWordList(); }
function switchView(view) {
    document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',(view==='study'&&i===0)||(view==='words'&&i===1)));
    document.getElementById('studyView').classList.toggle('hidden',view!=='study');
    document.getElementById('wordsView').classList.toggle('hidden',view!=='words');
    if(view==='words')renderWordList();
}
function esc(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!document.getElementById('wordsView').classList.contains('hidden'))addWord();});
startDeck(words);
</script>
</body>
</html>
